<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
        <style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f9fbfd;
}

/* SECTION */
.services{
    padding:50px 20px;
    text-align:center;
}

.services h2{
    font-size:32px;
    margin-bottom:30px;
    color:#ff4d6d;
}

/* GRID CONTAINER */
.service-container{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    max-width:1100px;
    margin:auto;
}

/* CARD */
.service-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    transition:0.3s;
}

.service-card:hover{
    transform:translateY(-5px);
}

.service-card h3{
    margin-bottom:10px;
    color:#ff4d6d;
}

.service-card p{
    font-size:14px;
    color:#555;
}

/* TABLET */
@media(max-width:1024px){
    .service-container{
        grid-template-columns:repeat(2, 1fr);
    }
}

/* MOBILE */
@media(max-width:600px){
    .service-container{
        grid-template-columns:1fr;
    }

    .services h2{
        font-size:26px;
    }
}
</style>
</head>
<body>
    <section class="services">
    <h2>Our Services</h2>

    <div class="service-container">

        <div class="service-card">
            <h3>Pregnancy Care</h3>
            <p>Complete checkups, diet plans and monitoring.</p>
        </div>

        <div class="service-card">
            <h3>Delivery Services</h3>
            <p>Normal delivery & C-section with expert care.</p>
        </div>

        <div class="service-card">
            <h3>Ultrasound</h3>
            <p>Advanced scanning for mother & baby safety.</p>
        </div>

        <div class="service-card">
            <h3>Newborn Care</h3>
            <p>Vaccination & full baby care support.</p>
        </div>

    </div>
</section>
</body>
</html>
